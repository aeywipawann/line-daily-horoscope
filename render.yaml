services:
  - type: web
    name: line-daily-horoscope
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run db:migrate && npm run db:seed && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: line-horoscope-db
          property: connectionString
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: APP_BASE_URL
        sync: false

databases:
  - name: line-horoscope-db
    plan: free

