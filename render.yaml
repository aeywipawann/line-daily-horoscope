services:
  - type: web
    name: line-daily-horoscope
    runtime: node
    plan: free
    buildCommand: "pnpm install --frozen-lockfile && pnpm run build"
    startCommand: "pnpm run db:migrate && pnpm run db:seed && pnpm start"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_SSL
        value: "true"

      - key: DATABASE_URL
        fromDatabase:
          name: line-horoscope-db
          property: connectionString

      - key: LINE_CHANNEL_SECRET
        sync: false

      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false

      - key: SESSION_SECRET
        generateValue: true

      - key: ADMIN_USERNAME
        sync: false

      - key: ADMIN_PASSWORD_HASH
        sync: false

      - key: APP_BASE_URL
        sync: false

      - key: USER_RATE_LIMIT_WINDOW_SECONDS
        value: "20"

      - key: USER_RATE_LIMIT_MAX
        value: "5"

databases:
  - name: line-horoscope-db
    plan: free
